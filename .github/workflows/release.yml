name: Release

on:
  push:
    tags:
      - 'V*'

permissions:
  contents: write

jobs:
  release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Validate release tag
        id: tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -cmatch '^V\d{10}$') {
            "valid=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          "valid=false" >> $env:GITHUB_OUTPUT
          "Tag $env:GITHUB_REF_NAME does not match the release format. Skipping release."

      - name: Checkout
        if: steps.tag.outputs.valid == 'true'
        uses: actions/checkout@v4

      - name: Build desktop app
        if: steps.tag.outputs.valid == 'true'
        shell: pwsh
        run: ./desktop-app/build-desktop-app.ps1

      - name: Package Windows files
        if: steps.tag.outputs.valid == 'true'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $packageName = "nocly-$tag-windows"
          $packageRoot = Join-Path $env:RUNNER_TEMP $packageName
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "$packageName.zip"

          New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot 'desktop-app') -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $packageRoot '.tools') -Force | Out-Null

          Copy-Item -LiteralPath 'start-work.bat' -Destination $packageRoot
          Copy-Item -LiteralPath 'start-work.ps1' -Destination $packageRoot
          Copy-Item -LiteralPath 'desktop-app/Nocly.exe' -Destination (Join-Path $packageRoot 'desktop-app')
          Copy-Item -LiteralPath 'desktop-app/projects.example.txt' -Destination (Join-Path $packageRoot 'desktop-app')
          Copy-Item -LiteralPath '.tools/VirtualDesktop.1.5.11' -Destination (Join-Path $packageRoot '.tools') -Recurse

          Compress-Archive -LiteralPath $packageRoot -DestinationPath $zipPath -Force

      - name: Create GitHub release
        if: steps.tag.outputs.valid == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: nocly-${{ github.ref_name }}-windows.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
